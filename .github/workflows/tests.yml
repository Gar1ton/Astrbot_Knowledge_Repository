# TEMPLATE — CI 占位：push/PR 时自动跑测试。按真实项目调整 Python 版本与命令。
name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 若被测代码依赖某宿主框架（如 astrbot），在此 clone/安装它以满足 import。
      # - name: Provision host framework
      #   run: <在此准备运行时依赖>

      - name: Run Pytest
        run: |
          python -m pytest
