<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); color: var(--fg); }
  .wrap { padding: 22px 24px; display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px 24px; align-items: start; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 8px; }
  .rowi { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script type="text/babel">
  const { Card, Badge, StatusChip, QuotaBar } = window.KnowledgeRepositoryDesignSystem_3c9571;
  function Demo() {
    return (
      <React.Fragment>
        <div>
          <div className="lbl">Card</div>
          <Card style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--heading)" }}>系统配置说明.txt</div>
            <div style={{ fontSize: 11, color: "var(--fg-muted)", marginTop: 4 }}>default · 3 分块 · 12.8 KB</div>
          </Card>
          <Card featured>
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--heading)" }}>✦ Research Agent</div>
            <div style={{ fontSize: 11, color: "var(--fg-muted)", marginTop: 4 }}>向知识库提问，引用来源</div>
          </Card>
        </div>
        <div>
          <div className="lbl">Badge</div>
          <div className="rowi" style={{ marginBottom: 14 }}>
            <Badge tone="info">本地上传</Badge>
            <Badge tone="violet">Zotero 同步</Badge>
            <Badge tone="neutral">只读</Badge>
            <Badge tone="warn">已脱管</Badge>
            <Badge tone="accent">即将上线</Badge>
          </div>
          <div className="lbl">StatusChip</div>
          <div className="rowi" style={{ marginBottom: 16 }}>
            <StatusChip status="ready">就绪</StatusChip>
            <StatusChip status="degraded">待处理</StatusChip>
            <StatusChip status="off">可选 · 关闭</StatusChip>
            <StatusChip status="info">信息</StatusChip>
          </div>
          <div className="lbl">QuotaBar</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <QuotaBar ratio={0.298} label="R2 对象存储" detail="3.2 GB / 10 GB" />
            <QuotaBar ratio={0.86} label="Notion 同步" detail="860 MB / 1 GB" />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
