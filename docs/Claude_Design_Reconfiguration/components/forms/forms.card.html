<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); color: var(--fg); }
  .wrap { padding: 22px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px; align-items: start; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 8px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .rowi { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script type="text/babel">
  const { Input, Tag, Toggle, Select } = window.KnowledgeRepositoryDesignSystem_3c9571;
  function Demo() {
    const [col, setCol] = React.useState("papers");
    const [t1, setT1] = React.useState(true);
    const [t2, setT2] = React.useState(false);
    return (
      <React.Fragment>
        <div>
          <div className="lbl">Input</div>
          <div className="stack">
            <Input placeholder="输入标签后按 Enter" />
            <Input mono size="sm" defaultValue="knowledge_repository.db" />
            <Input invalid defaultValue="重名集合" />
          </div>
        </div>
        <div>
          <div className="lbl">Select</div>
          <Select value={col} onChange={setCol} size="md"
            options={[{value:'papers',label:'papers'},{value:'manuals',label:'manuals'},{value:'default',label:'default'}]} />
        </div>
        <div>
          <div className="lbl">Tag</div>
          <div className="rowi">
            <Tag label="transformer" />
            <Tag label="rag" accent />
            <Tag label="nlp" onRemove={()=>{}} />
            <Tag label="语义检索" accent onRemove={()=>{}} />
          </div>
        </div>
        <div>
          <div className="lbl">Toggle</div>
          <div className="stack">
            <Toggle checked={t1} onChange={setT1} label="自动索引" />
            <Toggle checked={t2} onChange={setT2} label="启用 Persona 角色设定" />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
