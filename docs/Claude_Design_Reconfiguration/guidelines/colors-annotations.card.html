<!-- @dsCard group="Colors" viewport="700x140" name="Annotation Highlights" subtitle="Zotero-style highlight colors for Notes" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface); font-family:var(--font-sans); }
  .row { display:flex; gap:12px; padding:22px 24px; }
  .sw { flex:1; border-radius:7px; overflow:hidden; border:1px solid var(--border); display:flex; }
  .bar { width:4px; flex-shrink:0; }
  .body { padding:8px 10px; flex:1; }
  .nm { font-size:11px; font-weight:600; }
  .ex { font-size:10px; color:var(--fg-muted); margin-top:3px; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ann-purple-bg)"><div class="bar" style="background:var(--ann-purple)"></div><div class="body"><div class="nm" style="color:var(--ann-purple)">Purple</div><div class="ex">claim</div></div></div>
    <div class="sw" style="background:var(--ann-yellow-bg)"><div class="bar" style="background:var(--ann-yellow)"></div><div class="body"><div class="nm" style="color:var(--ann-yellow)">Yellow</div><div class="ex">key result</div></div></div>
    <div class="sw" style="background:var(--ann-green-bg)"><div class="bar" style="background:var(--ann-green)"></div><div class="body"><div class="nm" style="color:var(--ann-green)">Green</div><div class="ex">method</div></div></div>
    <div class="sw" style="background:var(--ann-red-bg)"><div class="bar" style="background:var(--ann-red)"></div><div class="body"><div class="nm" style="color:var(--ann-red)">Red</div><div class="ex">caveat</div></div></div>
    <div class="sw" style="background:var(--ann-blue-bg)"><div class="bar" style="background:var(--ann-blue)"></div><div class="body"><div class="nm" style="color:var(--ann-blue)">Blue</div><div class="ex">context</div></div></div>
  </div>
</body></html>
