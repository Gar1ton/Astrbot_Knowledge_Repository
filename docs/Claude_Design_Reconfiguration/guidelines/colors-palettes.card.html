<!-- @dsCard group="Colors" viewport="700x150" name="Palette Swatches" subtitle="data-palette accent presets" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; padding:22px 24px; }
  .sw { text-align:center; }
  .dot { width:100%; height:48px; border-radius:8px; border:1px solid var(--border); }
  .nm { font-size:10.5px; font-weight:600; color:var(--fg-muted); margin-top:7px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw" data-palette="blue"><div class="dot" style="background:var(--accent)"></div><div class="nm">Blue</div></div>
    <div class="sw" data-palette="violet"><div class="dot" style="background:var(--accent)"></div><div class="nm">Violet</div></div>
    <div class="sw" data-palette="teal"><div class="dot" style="background:var(--accent)"></div><div class="nm">Teal</div></div>
    <div class="sw" data-palette="amber"><div class="dot" style="background:var(--accent)"></div><div class="nm">Amber</div></div>
    <div class="sw" data-palette="rose"><div class="dot" style="background:var(--accent)"></div><div class="nm">Rose</div></div>
    <div class="sw" data-palette="graphite"><div class="dot" style="background:var(--accent)"></div><div class="nm">Graphite</div></div>
  </div>
</body></html>
