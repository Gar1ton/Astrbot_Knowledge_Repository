<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px grid · --space-1 → --space-12" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface); font-family:var(--font-sans); padding:20px 24px; }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .c { text-align:center; }
  .bar { background:var(--accent-soft); border:1px solid var(--accent-border); border-radius:4px; }
  .nm { font-size:10px; font-family:var(--font-mono); color:var(--fg-subtle); margin-top:6px; }
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="bar" style="width:4px;height:4px"></div><div class="nm">1·4</div></div>
    <div class="c"><div class="bar" style="width:8px;height:8px"></div><div class="nm">3·8</div></div>
    <div class="c"><div class="bar" style="width:12px;height:12px"></div><div class="nm">5·12</div></div>
    <div class="c"><div class="bar" style="width:16px;height:16px"></div><div class="nm">7·16</div></div>
    <div class="c"><div class="bar" style="width:20px;height:20px"></div><div class="nm">8·20</div></div>
    <div class="c"><div class="bar" style="width:24px;height:24px"></div><div class="nm">9·24</div></div>
    <div class="c"><div class="bar" style="width:32px;height:32px"></div><div class="nm">10·32</div></div>
    <div class="c"><div class="bar" style="width:40px;height:40px"></div><div class="nm">12·40</div></div>
  </div>
</body></html>
