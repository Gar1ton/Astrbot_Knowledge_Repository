<!-- @dsCard group="Type" viewport="700x170" name="Inter — UI Typeface" subtitle="Headings, body, labels (tight tracking on headings)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface); font-family:var(--font-sans); padding:20px 24px; color:var(--fg); }
  .h1 { font-size:26px; font-weight:700; color:var(--heading); letter-spacing:-0.02em; line-height:1.15; }
  .h2 { font-size:20px; font-weight:700; color:var(--heading); letter-spacing:-0.02em; margin-top:10px; }
  .body { font-size:13px; line-height:1.65; color:var(--fg); margin-top:10px; max-width:560px; }
  .eyebrow { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-subtle); margin-top:14px; }
</style></head>
<body>
  <div class="h1">知识库控制台 · Knowledge Repository</div>
  <div class="h2">Research Agent &amp; document workbench</div>
  <div class="body">Inter carries the entire UI — dense, legible at 13px body. Headings use the ink <b>--heading</b> color with −0.02em tracking. Weights run 400 / 450 / 500 / 600 / 700.</div>
  <div class="eyebrow">Eyebrow label · uppercase · 0.06em</div>
</body></html>
