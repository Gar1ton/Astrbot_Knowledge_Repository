<!-- @dsCard group="Type" viewport="700x210" name="Type Scale" subtitle="2xs 10 → 2xl 26 · dense console ramp" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface); font-family:var(--font-sans); padding:18px 24px; color:var(--fg); }
  .r { display:flex; align-items:baseline; gap:16px; padding:4px 0; border-bottom:1px solid var(--border); }
  .tok { width:120px; font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); flex-shrink:0; }
  .sample { color:var(--heading); font-weight:600; }
</style></head>
<body>
  <div class="r"><span class="tok">--text-2xs · 10</span><span class="sample" style="font-size:10px">RRF 0.0327</span></div>
  <div class="r"><span class="tok">--text-xs · 11</span><span class="sample" style="font-size:11px">Tag / caption</span></div>
  <div class="r"><span class="tok">--text-sm · 12</span><span class="sample" style="font-size:12px">Secondary UI</span></div>
  <div class="r"><span class="tok">--text-base · 13</span><span class="sample" style="font-size:13px">Body / default</span></div>
  <div class="r"><span class="tok">--text-md · 14</span><span class="sample" style="font-size:14px">Control label</span></div>
  <div class="r"><span class="tok">--text-lg · 16</span><span class="sample" style="font-size:16px">Panel title</span></div>
  <div class="r"><span class="tok">--text-xl · 20</span><span class="sample" style="font-size:20px;letter-spacing:-0.02em">Page heading</span></div>
  <div class="r" style="border:none"><span class="tok">--text-2xl · 26</span><span class="sample" style="font-size:26px;letter-spacing:-0.02em">Hero mark</span></div>
</body></html>
